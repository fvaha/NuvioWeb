<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script>
    (function configureTizenLaunch() {
      var root = typeof globalThis !== "undefined" ? globalThis : window;
      var search = String((window.location && window.location.search) || "").toLowerCase();
      var userAgent = String((window.navigator && window.navigator.userAgent) || "").toLowerCase();
      var webapis = root.webapis || {};
      var isTizenLaunch = Boolean(
        root.__NUVIO_PLATFORM__ === "tizen"
        || root.tizen
        || root.avplay
        || webapis.avplay
        || webapis.avPlay
        || webapis.productinfo
        || search.indexOf("wrapper=tizen") !== -1
        || userAgent.indexOf("tizen") !== -1
      );

      if (!isTizenLaunch) {
        return;
      }

      root.__NUVIO_PLATFORM__ = "tizen";
      var viewport = document.querySelector("meta[name='viewport']");
      if (!viewport) {
        viewport = document.createElement("meta");
        viewport.name = "viewport";
        document.head.appendChild(viewport);
      }
      viewport.setAttribute("content", "width=1920, height=1080, initial-scale=1.0, maximum-scale=1.0, user-scalable=no");
    }());
  </script>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Nuvio TV</title>
  
  <link rel="stylesheet" href="css/base.css?v=20260509s" />
  <link rel="stylesheet" href="css/layout.css?v=20260509s" />
  <link rel="stylesheet" href="css/components.css?v=20260531supporters2" />
  <link rel="stylesheet" href="css/themes.css?v=20260509s" />
</head>
<body>
  <style>
    #boot-splash {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      z-index: 100000; background: #0d101e; transition: opacity 380ms ease;
    }
    #boot-splash.boot-splash-hide { opacity: 0; pointer-events: none; }
    #boot-splash .boot-splash-inner {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; width: 100%;
    }
    #boot-splash .boot-splash-logo { display: block; margin: 0 auto; width: 460px; max-width: 42vw; height: auto; }
    #boot-splash .boot-splash-spinner {
      width: 60px; height: 60px; margin: 40px auto 0; border-radius: 50%;
      border: 5px solid rgba(255, 255, 255, 0.14); border-top-color: #ffffff;
      animation: bootSplashSpin 0.9s linear infinite;
    }
    #boot-splash .boot-splash-text {
      margin-top: 22px; color: rgba(233, 240, 248, 0.66);
      font-family: "Segoe UI", Arial, sans-serif; font-size: 24px; letter-spacing: 0.05em;
    }
    @keyframes bootSplashSpin { to { transform: rotate(360deg); } }
  </style>
  <div id="boot-splash">
    <div class="boot-splash-inner">
      <img class="boot-splash-logo" src="assets/images/nuviotv.png" alt="Nuvio" onerror="this.style.display='none'" />
      <div class="boot-splash-spinner"></div>
      <div class="boot-splash-text">Loading…</div>
    </div>
  </div>
  <script src="nuvio.env.js"></script>
  
  <script src="assets/libs/qrcode-generator.js"></script>
  
  <script src="app.bundle.js?v=20260531supporters2"></script>
 </body>
 </html>
